name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      baseName:
        description: 'Base name for resources'
        required: true
        default: 'myapp'
      location:
        description: 'Location for App Service and SQL'
        required: true
        default: 'uksouth'
      openAiLocation:
        description: 'Location for Azure OpenAI'
        required: true
        default: 'swedencentral'
      sqlEntraAdminObjectId:
        description: 'Entra ID admin object ID for SQL Server'
        required: true
      sqlEntraAdminLogin:
        description: 'Entra ID admin login name for SQL Server'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location ${{ github.event.inputs.location }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ./infra/bicep/main.bicep
          parameters: >
            baseName=${{ github.event.inputs.baseName }}
            environment=${{ github.event.inputs.environment }}
            location=${{ github.event.inputs.location }}
            openAiLocation=${{ github.event.inputs.openAiLocation }}
            sqlEntraAdminObjectId=${{ github.event.inputs.sqlEntraAdminObjectId }}
            sqlEntraAdminLogin=${{ github.event.inputs.sqlEntraAdminLogin }}
          failOnStdErr: false

      - name: Show Deployment Outputs
        run: |
          echo "Deployment completed successfully!"
          echo "Check the Azure Portal for deployed resources in resource group: ${{ secrets.AZURE_RESOURCE_GROUP }}"
